name: Unity CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest
    env:
      UNITY_VERSION: 6.4
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup Unity (GameCI)
        uses: game-ci/unity-builder@v2
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
      - name: Restore dependencies
        run: pwsh -NoProfile -Command "dotnet restore" || echo 'no dotnet projects'
      - name: Run headless playmode tests
        run: pwsh tools\run-headless-playtests.ps1 -UnityPath ${{ runner.tool_cache }}/Unity/${{ env.UNITY_VERSION }}/Editor/Unity.exe
      - name: Build Windows player
        run: pwsh tools\build-unity.ps1 -UnityPath ${{ runner.tool_cache }}/Unity/${{ env.UNITY_VERSION }}/Editor/Unity.exe -Target Windows64 -BuildDir build\Windows
