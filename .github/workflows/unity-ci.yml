name: Unity CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest
    env:
      UNITY_VERSION: 6.4
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Debug secrets
        shell: pwsh
        run: |
          if (-not $env:UNITY_LICENSE -or $env:UNITY_LICENSE -eq '') {
            Write-Output "UNITY_LICENSE: MISSING"
          } else {
            Write-Output "UNITY_LICENSE: SET"
          }

      - name: Write Unity license file (decode secret)
        if: ${{ env.UNITY_LICENSE != '' }}
        shell: pwsh
        run: |
          $outPath = 'C:\\ProgramData\\Unity\\Unity_lic.ulf'
          $envVar = '${{ env.UNITY_LICENSE }}'
          try {
            $bytes = [System.Convert]::FromBase64String($envVar)
            $text = [System.Text.Encoding]::UTF8.GetString($bytes)
            New-Item -ItemType Directory -Force -Path (Split-Path $outPath) | Out-Null
            Set-Content -Path $outPath -Value $text -Encoding UTF8
            Write-Output "Wrote base64-decoded license to $outPath"
          } catch {
            New-Item -ItemType Directory -Force -Path (Split-Path $outPath) | Out-Null
            Set-Content -Path $outPath -Value $envVar -Encoding UTF8
            Write-Output "Wrote raw license text to $outPath"
          }

      - name: Setup Unity (GameCI)
        if: ${{ env.UNITY_LICENSE != '' }}
        uses: game-ci/unity-builder@v2
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
      - name: Restore dependencies
        run: pwsh -NoProfile -Command "dotnet restore" || echo 'no dotnet projects'
      - name: Run headless playmode tests
        if: ${{ env.UNITY_LICENSE != '' }}
        run: pwsh tools\run-headless-playtests.ps1 -UnityPath ${{ runner.tool_cache }}/Unity/${{ env.UNITY_VERSION }}/Editor/Unity.exe
      - name: Build Windows player
        if: ${{ env.UNITY_LICENSE != '' }}
        run: pwsh tools\build-unity.ps1 -UnityPath ${{ runner.tool_cache }}/Unity/${{ env.UNITY_VERSION }}/Editor/Unity.exe -Target Windows64 -BuildDir build\Windows
